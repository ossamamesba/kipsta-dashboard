<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pointage Linéaire KIPSTA — Decathlon Rabat Hay Riad</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bl:#1565C0;--bl2:#0D47A1;--bll:#E3F2FD;
  --gr:#2E7D32;--grl:#E8F5E9;
  --re:#C62828;--rel:#FFEBEE;
  --am:#F57F17;--aml:#FFFDE7;
  --gy:#455A64;--gyl:#ECEFF1;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F0F4F8;color:#212121;font-size:13px;min-height:100vh}
button,input{font-family:inherit}
/* BUTTONS */
.btn{padding:9px 18px;border-radius:8px;border:1.5px solid #BDBDBD;background:white;color:#212121;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:hover{background:#F5F5F5;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.primary{background:var(--bl);color:white;border-color:var(--bl)}
.btn.primary:hover{background:var(--bl2)}
.btn.sm{padding:6px 12px;font-size:11px}
.btn.outline{background:transparent;color:white;border-color:rgba(255,255,255,0.5)}
.btn.outline:hover{background:rgba(255,255,255,0.15)}
/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.bdg.ok{background:var(--grl);color:#1B5E20}
.bdg.ko{background:var(--rel);color:#B71C1C}
.bdg.nc{background:#F5F5F5;color:#9E9E9E;border:1px solid #E0E0E0}
.bdg.mr{background:var(--bll);color:#0C447C}
.bdg.dc{background:var(--aml);color:#5D4037}
/* TOGGLE BUTTONS */
.tog{display:inline-flex;align-items:center;justify-content:center;width:42px;height:25px;border-radius:13px;border:1.5px solid;font-size:11px;font-weight:700;cursor:pointer;transition:all .12s}
.tog.ok{background:var(--grl);color:var(--gr);border-color:var(--gr)}
.tog.ko{background:var(--rel);color:var(--re);border-color:var(--re)}
.tog.nc{background:#F5F5F5;color:#BDBDBD;border-color:#E0E0E0}
.tog:hover{opacity:.8;transform:scale(1.08)}
/* CARDS */
.card{background:white;border-radius:14px;border:1px solid #E8ECF0;padding:18px}
/* FORMS */
input[type=text]{padding:12px 14px;border:2px solid #E0E0E0;border-radius:10px;font-size:14px;outline:none;width:100%;transition:border-color .2s;color:#212121;background:white}
input[type=text]:focus{border-color:var(--bl)}
/* TABLE */
table{border-collapse:collapse;width:100%}
th{padding:8px 10px;font-size:11px;font-weight:700;color:white;text-align:center}
th.left{text-align:left}
td{padding:6px 8px;border-bottom:1px solid #F0F0F0;vertical-align:middle}
tr:hover td:not(.noho){background:#FAFAFA}
.score-row td{background:var(--gyl)!important;font-weight:700;font-size:11px;color:var(--gy)}
/* PROGRESS BAR */
.pbar{height:5px;background:#EEEEEE;border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .4s}
/* SAVE INDICATOR */
#saveInd{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:30px;background:#2E7D32;color:white;font-size:12px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:opacity .3s;opacity:0;pointer-events:none;z-index:999}
/* NAV */
.nav-tab{padding:9px 14px;border:none;border-radius:8px 8px 0 0;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
/* GRID */
.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
/* PRINT */
@media print{
  .no-print{display:none!important}
  body{background:white}
  #saveInd{display:none}
  .card{box-shadow:none;border:1px solid #CCC}
}
/* MOBILE */
@media(max-width:640px){
  .ugrid{grid-template-columns:repeat(2,1fr)}
  .hide-sm{display:none!important}
  .stack-sm{flex-direction:column!important}
}
</style>
</head>

/* ============ HELPERS ============ */
function colIdx(ui,si){return UNIVERS.slice(0,ui).reduce((a,u)=>a+u.subs.length,0)+si;}
function initData(){
  const d={};
  UNIVERS.forEach((u,ui)=>u.subs.forEach((_,si)=>{d[ui+'-'+si]=[...RAW[colIdx(ui,si)]]}));
  return d;
}
function calcScore(vals,sec){
  const r=sec?vals.filter((_,i)=>CRIT[i].s===sec):vals;
  const ok=r.filter(v=>v==='1').length, ko=r.filter(v=>v==='0').length, t=ok+ko;
  return t>0?ok/t:null;
}
function globalScore(audit){
  let ok=0,ko=0;
  Object.values(audit).forEach(v=>{ok+=v.filter(x=>x==='1').length;ko+=v.filter(x=>x==='0').length;});
  return ok+ko>0?ok/(ok+ko):null;
}
const SC=v=>v===null?'#9E9E9E':v>=.85?'#2E7D32':v>=.6?'#F57F17':'#C62828';
const SBG=v=>v===null?'#F5F5F5':v>=.85?'#E8F5E9':v>=.6?'#FFFDE7':'#FFEBEE';
const PS=v=>v===null?'NC':Math.round(v*100)+'%';

/* ============ STORAGE ============ */
function lsGet(k,def){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):def;}catch{return def;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function getUsers(){return lsGet('kps4_users',[]);}
function saveUsers(l){lsSet('kps4_users',l);}
function getAudit(u){return lsGet('kps4_audit_'+u,null);}
function saveAudit(u,d){lsSet('kps4_audit_'+u,d);}
function getLastDate(u){return lsGet('kps4_date_'+u,'');}
function saveLastDate(u){lsSet('kps4_date_'+u,new Date().toLocaleDateString('fr-MA',{day:'numeric',month:'short',year:'numeric'}));}

/* ============ STATE ============ */
let CU='', TAB=-1, ST=null;
let SAVE_T=null;

function showSaved(){
  const el=document.getElementById('saveInd');
  if(!el)return;
  el.style.opacity='1';
  clearTimeout(SAVE_T);
  SAVE_T=setTimeout(()=>{el.style.opacity='0';},2200);
}

/* ============ LOGIN ============ */
function login(){
  const inp=document.getElementById('li');
  const name=(inp?inp.value:'').trim();
  if(!name)return;
  const users=getUsers();
  if(!users.includes(name)){users.push(name);saveUsers(users);}
  if(!getAudit(name)){saveAudit(name,initData());}
  saveLastDate(name);
  CU=name; TAB=-1;
  render();
}
function logout(){CU='';TAB=-1;render();}

/* ============ TOGGLE ============ */
function tog(ui,si,ci){
  const a=getAudit(CU)||initData();
  const cycle={'nc':'1','1':'0','0':'nc'};
  a[ui+'-'+si][ci]=cycle[a[ui+'-'+si][ci]]||'nc';
  saveAudit(CU,a);
  saveLastDate(CU);
  showSaved();
  render();
}

function myVals(ui,si){const a=getAudit(CU)||initData();return a[ui+'-'+si]||[...RAW[colIdx(ui,si)]];}
function setTab(i){TAB=i;render();}

/* ============ RENDER ============ */
function render(){
  document.getElementById('app').innerHTML = CU ? renderMain() : renderLogin();
}

  +'<div style="display:flex;align-items:center;gap:4px"><div style="width:14px;height:14px;background:#F5F5F5;border:1px solid #E0E0E0;border-radius:3px"></div>NC</div>'

  +'</tr></thead>';

  const tableBody=CRIT.map((c,ci)=>{

  const issueBlock=issues.length
  ?'<div style="background:var(--rel);border:1px solid #FFCDD2;border-radius:10px;padding:14px 16px;margin-top:14px">'
  +'<div style="font-size:13px;font-weight:700;color:var(--re);margin-bottom:9px">⚠ '+issues.length+' point'+(issues.length>1?'s':'')+' à corriger</div>'
  +'<div style="display:flex;flex-direction:column;gap:5px">'+issues.map(i=>'<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#B71C1C"><span class="bdg ko">KO</span>['+i.sub+'] — '+i.crit+'</div>').join('')+'</div></div>'
  :'<div style="background:var(--grl);border:1px solid #A5D6A7;border-radius:10px;padding:14px;text-align:center;color:#1B5E20;font-weight:700;font-size:14px;margin-top:14px">✓ Univers '+u.name+' totalement conforme !</div>';

  return banner+subCards+legend
  +'<div class="card" style="padding:0;overflow:hidden;margin-bottom:4px"><div style="overflow-x:auto"><table>'+tableHead+'<tbody>'+tableBody+scoreRows+'</tbody></table></div></div>'
  +issueBlock
  +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">'
  +'<button class="btn no-print" onclick="setTab(-1)">← Dashboard</button>'
  +'<button class="btn sm no-print" onclick="exportCSV()">⬇ CSV</button>'
  +'<button class="btn primary no-print" onclick="window.print()">🖨 Imprimer</button>'
  +'</div>';
}

/* ============ CHARTS ============ */
function renderCharts(){
  return '<div style="margin-top:28px">'
  +'<div style="font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px">'
  +'<span style="width:4px;height:20px;background:var(--bl);border-radius:2px;display:inline-block"></span>'
  +'Rapport visuel — Résultats du pointage</div>'
  // Row 1: Bar chart + Radar
  +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'
  +'<div class="card" style="padding:18px"><div style="font-size:12px;font-weight:700;color:var(--gy);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">Score par univers (%)</div><canvas id="chartBar" height="220"></canvas></div>'
  +'<div class="card" style="padding:18px"><div style="font-size:12px;font-weight:700;color:var(--gy);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">MR vs DC par univers</div><canvas id="chartGrouped" height="220"></canvas></div>'
  +'</div>'
  // Row 2: Donut + Critères
  +'<div style="display:grid;grid-template-columns:280px 1fr;gap:14px;margin-bottom:14px">'
  +'<div class="card" style="padding:18px;display:flex;flex-direction:column;align-items:center">'
  +'<div style="font-size:12px;font-weight:700;color:var(--gy);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;align-self:flex-start">Conformité globale</div>'
  +'<canvas id="chartDonut" width="180" height="180" style="max-width:180px"></canvas>'
  +'<div id="donutLegend" style="margin-top:14px;width:100%"></div>'
  +'</div>'
  +'<div class="card" style="padding:18px"><div style="font-size:12px;font-weight:700;color:var(--gy);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">Taux de conformité par critère (%)</div><canvas id="chartCrit" height="200"></canvas></div>'
  +'</div>'
  // Row 3: Heatmap table
  +'<div class="card" style="padding:18px;margin-bottom:14px">'
  +'<div style="font-size:12px;font-weight:700;color:var(--gy);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px">Carte thermique — Conformité par univers et critère</div>'
  +'<div id="heatmap" style="overflow-x:auto"></div>'
  +'</div>'
  +'</div>';
}

function initCharts(){
  if(typeof Chart==='undefined')return;
  const a=getAudit(CU)||initData();

  // ---- DATA ----
  const labels=UNIVERS.map(u=>u.short);
  const colors=UNIVERS.map(u=>u.color);
  const scores=UNIVERS.map((u,ui)=>{
    let ok=0,ko=0;
    u.subs.forEach((_,si)=>{const v=a[ui+'-'+si]||[];v.forEach(x=>{if(x==='1')ok++;else if(x==='0')ko++;});});
    return ok+ko>0?Math.round(ok/(ok+ko)*100):0;
  });
  const mrScores=UNIVERS.map((u,ui)=>{
    let ok=0,ko=0;
    u.subs.forEach((_,si)=>{const v=a[ui+'-'+si]||[];v.forEach((x,ci)=>{if(CRIT[ci]&&CRIT[ci].s==='MR'){if(x==='1')ok++;else if(x==='0')ko++;}});});
    return ok+ko>0?Math.round(ok/(ok+ko)*100):0;
  });
  const dcScores=UNIVERS.map((u,ui)=>{
    let ok=0,ko=0;
    u.subs.forEach((_,si)=>{const v=a[ui+'-'+si]||[];v.forEach((x,ci)=>{if(CRIT[ci]&&CRIT[ci].s==='DC'){if(x==='1')ok++;else if(x==='0')ko++;}});});
    return ok+ko>0?Math.round(ok/(ok+ko)*100):0;
  });

  const barColors=scores.map(s=>s>=85?'#2E7D32':s>=60?'#F57F17':'#C62828');
  const borderColors=scores.map(s=>s>=85?'#1B5E20':s>=60?'#E65100':'#B71C1C');

  const chartDefaults={
    font:{family:"'Segoe UI',Arial,sans-serif"},
    color:'#607D8B',
  };
  Chart.defaults.font.family=chartDefaults.font.family;

  // ---- BAR CHART ----
  const ctxBar=document.getElementById('chartBar');
  if(ctxBar){
    new Chart(ctxBar,{
      type:'bar',
      data:{
        labels,
        datasets:[{
          label:'Score global (%)',
          data:scores,
          backgroundColor:barColors.map(c=>c+'CC'),
          borderColor:borderColors,
          borderWidth:2,
          borderRadius:6,
          borderSkipped:false,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{
            callbacks:{label:ctx=>' '+ctx.raw+'%'},
            backgroundColor:'#37474F',titleColor:'#fff',bodyColor:'#fff',
          }
        },
        scales:{
          y:{min:0,max:100,ticks:{callback:v=>v+'%',color:'#607D8B',font:{size:11}},grid:{color:'#EEEEEE'},border:{display:false}},
          x:{ticks:{color:'#455A64',font:{size:12,weight:'bold'}},grid:{display:false},border:{display:false}}
        },
        animation:{duration:800,easing:'easeOutQuart'}
      }
    });
  }

  // ---- GROUPED BAR (MR vs DC) ----
  const ctxG=document.getElementById('chartGrouped');
  if(ctxG){
    new Chart(ctxG,{
      type:'bar',
      data:{
        labels,
        datasets:[
          {label:'Magasin rapide (MR)',data:mrScores,backgroundColor:'#1565C0BB',borderColor:'#1565C0',borderWidth:1.5,borderRadius:4,borderSkipped:false},
          {label:'Dynamisme comm. (DC)',data:dcScores,backgroundColor:'#F57F17BB',borderColor:'#E65100',borderWidth:1.5,borderRadius:4,borderSkipped:false},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{position:'bottom',labels:{boxWidth:12,padding:16,font:{size:11},color:'#455A64'}},
          tooltip:{callbacks:{label:ctx=>' '+ctx.dataset.label+': '+ctx.raw+'%'},backgroundColor:'#37474F',titleColor:'#fff',bodyColor:'#fff'}
        },
        scales:{
          y:{min:0,max:100,ticks:{callback:v=>v+'%',color:'#607D8B',font:{size:11}},grid:{color:'#EEEEEE'},border:{display:false}},
          x:{ticks:{color:'#455A64',font:{size:12,weight:'bold'}},grid:{display:false},border:{display:false}}
        },
        animation:{duration:800}
      }
    });
  }

  // ---- DONUT ----
  let totalOK=0,totalKO=0,totalNC=0;
  UNIVERS.forEach((u,ui)=>u.subs.forEach((_,si)=>{
    const v=a[ui+'-'+si]||[];
    v.forEach(x=>{if(x==='1')totalOK++;else if(x==='0')totalKO++;else totalNC++;});
  }));
  const ctxD=document.getElementById('chartDonut');
  if(ctxD){
    new Chart(ctxD,{
      type:'doughnut',
      data:{
        labels:['Conformes','Non conformes','NC'],
        datasets:[{data:[totalOK,totalKO,totalNC],backgroundColor:['#2E7D32','#C62828','#BDBDBD'],borderColor:['#1B5E20','#B71C1C','#9E9E9E'],borderWidth:2,hoverOffset:6}]
      },
      options:{
        responsive:false,cutout:'72%',
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+ctx.raw+' ('+Math.round(ctx.raw/(totalOK+totalKO+totalNC)*100)+'%)'},backgroundColor:'#37474F',titleColor:'#fff',bodyColor:'#fff'}
        },
        animation:{duration:800}
      }
    });
    const lg=document.getElementById('donutLegend');
    if(lg){
      const total=totalOK+totalKO+totalNC;
      lg.innerHTML=[
        {c:'#2E7D32',l:'Conformes',n:totalOK},
        {c:'#C62828',l:'Non conformes',n:totalKO},
        {c:'#BDBDBD',l:'Non concernés',n:totalNC},
      ].map(i=>'<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #F5F5F5">'
        +'<div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;background:'+i.c+';border-radius:2px"></div><span style="font-size:11px;color:#455A64">'+i.l+'</span></div>'
        +'<span style="font-size:12px;font-weight:700;color:#212121">'+i.n+' <span style="color:#9E9E9E;font-weight:400;font-size:10px">('+Math.round(i.n/total*100)+'%)</span></span>'
        +'</div>'
      ).join('');
    }
  }

  // ---- CRITERIA BAR ----
  const critLabels=CRIT.map(c=>c.n.length>18?c.n.substring(0,16)+'…':c.n);
  const critScores=CRIT.map((c,ci)=>{
    let ok=0,ko=0;
    UNIVERS.forEach((u,ui)=>u.subs.forEach((_,si)=>{const v=(a[ui+'-'+si]||[])[ci];if(v==='1')ok++;else if(v==='0')ko++;}));
    return ok+ko>0?Math.round(ok/(ok+ko)*100):0;
  });
  const critColors=critScores.map(s=>s>=85?'#2E7D32BB':s>=60?'#F57F17BB':'#C62828BB');
  const ctxCrit=document.getElementById('chartCrit');
  if(ctxCrit){
    new Chart(ctxCrit,{
      type:'bar',
      data:{
        labels:critLabels,
        datasets:[{
          label:'Taux (%)',data:critScores,
          backgroundColor:critColors,
          borderColor:critColors.map(c=>c.replace('BB','FF')),
          borderWidth:1.5,borderRadius:4,borderSkipped:false
        }]
      },
      options:{
        indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:ctx=>' '+ctx.raw+'%'},backgroundColor:'#37474F',titleColor:'#fff',bodyColor:'#fff'}
        },
        scales:{
          x:{min:0,max:100,ticks:{callback:v=>v+'%',color:'#607D8B',font:{size:10}},grid:{color:'#EEEEEE'},border:{display:false}},
          y:{ticks:{color:'#455A64',font:{size:11}},grid:{display:false},border:{display:false}}
        },
        animation:{duration:800}
      }
    });
  }

  // ---- HEATMAP ----
  const hm=document.getElementById('heatmap');
  if(hm){
    let t='<table style="border-collapse:collapse;width:100%;min-width:600px;font-size:11px">';
    t+='<thead><tr><th style="padding:7px 10px;background:#37474F;color:white;text-align:left;min-width:150px">Critère</th>';
    UNIVERS.forEach(u=>{t+='<th style="padding:7px 8px;background:'+u.color+';color:white;text-align:center;min-width:64px">'+u.short+'</th>';});
    t+='</tr></thead><tbody>';
    CRIT.forEach((c,ci)=>{
      const secBg=c.s==='MR'?'#E3F2FD':'#FFFDE7';
      const secFg=c.s==='MR'?'#0C447C':'#5D4037';
      t+='<tr style="background:'+(ci%2===0?'white':'#FAFAFA')+'">';
      t+='<td style="padding:6px 10px;border-bottom:1px solid #F0F0F0">'
        +'<span style="display:inline-block;padding:1px 5px;border-radius:3px;background:'+secBg+';color:'+secFg+';font-size:9px;font-weight:700;margin-right:5px">'+c.s+'</span>'
        +c.n+'</td>';
      UNIVERS.forEach((u,ui)=>{
        let allVals=[];
        u.subs.forEach((_,si)=>{const v=(a[ui+'-'+si]||[])[ci];if(v)allVals.push(v);});
        const ok=allVals.filter(v=>v==='1').length;
        const ko=allVals.filter(v=>v==='0').length;
        const total=ok+ko;
        const pct=total>0?Math.round(ok/total*100):-1;
        const bg=pct<0?'#F5F5F5':pct>=85?'#C8E6C9':pct>=60?'#FFE0B2':'#FFCDD2';
        const fg=pct<0?'#BDBDBD':pct>=85?'#1B5E20':pct>=60?'#BF360C':'#B71C1C';
        const lbl=pct<0?'NC':pct+'%';
        t+='<td style="padding:5px 4px;border-bottom:1px solid #F0F0F0;text-align:center">'
          +'<span style="display:inline-block;padding:3px 6px;border-radius:4px;background:'+bg+';color:'+fg+';font-weight:700;min-width:36px">'+lbl+'</span>'
          +'</td>';
      });
      t+='</tr>';
    });
    // Score row
    t+='<tr style="background:#ECEFF1"><td style="padding:7px 10px;font-weight:700;font-size:11px;color:#455A64">Score global</td>';
    UNIVERS.forEach((u,ui)=>{
      const s=scores[ui];
      const c=s>=85?'#1B5E20':s>=60?'#E65100':'#B71C1C';
      t+='<td style="padding:6px 4px;text-align:center;font-weight:700;color:'+c+'">'+s+'%</td>';
    });
    t+='</tr>';
    t+='</tbody></table>';
    hm.innerHTML=t;
  }
}

/* ============ EXPORT ============ */
function exportCSV(){
  const date=new Date().toLocaleDateString('fr-MA');
  let csv='Auditeur,Date,Univers,Sous-rayon,Section,Critère,Valeur,Score\n';
  UNIVERS.forEach((u,ui)=>u.subs.forEach((sub,si)=>{
    const vals=myVals(ui,si), s=calcScore(vals);
    CRIT.forEach((c,ci)=>{
      const sec=c.s==='MR'?'Magasin rapide':'Dynamisme commercial';
      csv+='"'+CU+'","'+date+'","'+u.name+'","'+sub+'","'+sec+'","'+c.n+'","'+vals[ci]+'","'+PS(s)+'"\n';
    });
  }));
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='pointage_'+CU+'_'+date.replace(/\//g,'-')+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
(function(){
  var _orig=render;
  render=function(){
    _orig();
    if(typeof CU!=='undefined'&&CU&&typeof TAB!=='undefined'&&TAB===-1){
      setTimeout(initCharts,100);
    }
  };
  render();
})();
</script>
